name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0) or leave empty for latest'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build Windows executable
        env:
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          CGO_CFLAGS: -Wno-error=missing-braces
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          go build -trimpath -tags sqlite_fts5 -ldflags "-s -w -X main.version=$VERSION" -o wacli.exe ./cmd/wacli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wacli-windows-amd64
          path: wacli.exe
          retention-days: 30

      - name: Show build info
        run: |
          echo "✅ Build complete!"
          echo "📦 Binary: wacli.exe"
          echo "💾 Size: $(ls -lh wacli.exe | awk '{print $5}')"
